<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Audio DAW Stable</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #171717;
      color: #e6e6e6;
      font-family: Arial, sans-serif;
      overflow: auto;
    }
    .app {
      display: grid;
      grid-template-columns: 330px 1fr;
      height: 100vh;
      min-width: 0;
    }
    .sidebar {
      border-right: 1px solid #333;
      background: #1f1f1f;
      overflow-y: auto;
      padding: 12px;
    }
    .main {
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      min-width: 0;
      min-height: 0;
    }
    .panel {
      background: #202020;
      border: 1px solid #323232;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 10px;
    }
    .panel h3 {
      margin: 0 0 8px;
      font-size: 14px;
      color: #ffd27d;
    }
    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    label { font-size: 12px; color: #cfcfcf; }
    input[type="text"], input[type="number"], select {
      background: #111;
      color: #eaeaea;
      border: 1px solid #444;
      padding: 6px;
      border-radius: 4px;
      font-size: 12px;
    }
    input[type="number"] { width: 78px; }
    input[type="range"] { width: 110px; }
    button {
      background: #333;
      color: #fff;
      border: 1px solid #555;
      border-radius: 6px;
      padding: 7px 10px;
      cursor: pointer;
      font-size: 12px;
    }
    button:hover { background: #454545; }
    button.primary { background: #305f8f; }
    button.primary:hover { background: #3d75ae; }
    button.danger { background: #6a2d2d; }
    button.danger:hover { background: #8a3e3e; }
    button.active { background: #6a8f30; }
    .toolbar, .transport {
      border-bottom: 1px solid #2f2f2f;
      padding: 8px 10px;
      background: #1c1c1c;
      flex-shrink: 0;
    }
    .transport .time-readout {
      font-family: monospace;
      font-size: 13px;
      color: #ffd27d;
      margin-left: auto;
      min-width: 92px;
      text-align: right;
    }
    .canvas-wrap {
      overflow: auto;
      background: #101010;
      position: relative;
      min-width: 0;
      min-height: 0;
      scrollbar-gutter: stable both-edges;
    }
    canvas { display: block; cursor: crosshair; }
    .statusbar {
      border-top: 1px solid #2f2f2f;
      padding: 6px 10px;
      background: #1c1c1c;
      font-size: 12px;
      color: #bfbfbf;
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }
    .tracks-list { display: flex; flex-direction: column; gap: 8px; }
    .track-card {
      border: 1px solid #333;
      background: #181818;
      border-radius: 8px;
      padding: 8px;
    }
    .track-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
    }
    .track-header input[type="text"] {
      flex: 1;
      min-width: 0;
    }
    .mini { font-size: 11px; color: #999; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .track-controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      align-items: center;
    }
    .track-controls .full { grid-column: 1 / -1; }
    .small-btns { display: flex; gap: 6px; }
    .chip {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 999px;
      background: #2a2a2a;
      border: 1px solid #444;
      font-size: 11px;
    }
    .help {
      font-size: 12px;
      line-height: 1.5;
      color: #c8c8c8;
    }
    input[type="file"] { display: none; }
    @media (max-width: 1200px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
        height: auto;
        min-height: 100vh;
      }
      .sidebar {
        border-right: none;
        border-bottom: 1px solid #333;
        max-height: 42vh;
      }
      .main {
        min-height: 58vh;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="panel">
        <h3>프로젝트</h3>
        <div class="row">
          <label>이름</label>
          <input id="projectName" type="text" value="Game Audio Project" style="flex:1;" />
        </div>
        <div class="grid2">
          <div>
            <label>BPM</label>
            <input id="bpmInput" type="number" min="40" max="240" step="1" value="120" />
          </div>
          <div>
            <label>박자</label>
            <select id="timeSigNumerator">
              <option>2</option><option>3</option><option selected>4</option><option>5</option><option>6</option><option>7</option>
            </select>
          </div>
        </div>
        <div class="row">
          <label>스냅</label>
          <select id="snapSelect">
            <option value="0">Off</option>
            <option value="0.25">1/16</option>
            <option value="0.5" selected>1/8</option>
            <option value="1">1/4</option>
            <option value="2">1/2</option>
            <option value="4">1 Bar</option>
          </select>
        </div>
        <div class="row">
          <button id="saveProjectBtn">프로젝트 저장</button>
          <label class="chip">불러오기<input id="loadProjectInput" type="file" accept=".json" /></label>
        </div>
        <div class="row">
          <button id="exportWavBtn" class="primary">WAV Export</button>
          <button id="exportStemsBtn">Stem Export</button>
        </div>
        <div class="row">
          <button id="exportMidiBtn">MIDI Export</button>
          <label class="chip">MIDI 불러오기<input id="importMidiInput" type="file" accept=".mid,.midi" /></label>
        </div>
      </div>

      <div class="panel">
        <h3>루프 / 편집</h3>
        <div class="row">
          <label><input id="loopEnabled" type="checkbox" /> 루프 활성화</label>
        </div>
        <div class="grid2">
          <div>
            <label>루프 시작(beat)</label>
            <input id="loopStartInput" type="number" min="0" step="0.25" value="0" />
          </div>
          <div>
            <label>루프 끝(beat)</label>
            <input id="loopEndInput" type="number" min="1" step="0.25" value="16" />
          </div>
        </div>
        <div class="row">
          <button id="setLoopToSelectionBtn">선택영역→루프</button>
          <button id="duplicateSelectionBtn">선택 복제</button>
        </div>
        <div class="row">
          <button id="copySelectionBtn">복사</button>
          <button id="pasteSelectionBtn">붙여넣기</button>
          <button id="deleteSelectionBtn" class="danger">삭제</button>
        </div>
        <div class="row">
          <button id="selectAllTrackBtn">현재 레이어 전체 선택</button>
        </div>
      </div>

      <div class="panel">
        <h3>마스터 FX</h3>
        <div class="row"><label>Lowpass</label><input id="masterFilter" type="range" min="0" max="100" value="0" /></div>
        <div class="row"><label>Distortion</label><input id="masterDrive" type="range" min="0" max="100" value="0" /></div>
        <div class="row"><label>Delay</label><input id="masterDelay" type="range" min="0" max="100" value="0" /></div>
        <div class="row"><label>Reverb</label><input id="masterReverb" type="range" min="0" max="100" value="12" /></div>
        <div class="row"><label>Master Vol</label><input id="masterVolume" type="range" min="0" max="100" value="70" /></div>
      </div>

      <div class="panel">
        <h3>레이어 믹서</h3>
        <div class="row">
          <button id="addTrackBtn" class="primary">+ 레이어 추가</button>
        </div>
        <div id="tracksList" class="tracks-list"></div>
      </div>

      <div class="panel help">
        <h3>조작</h3>
        좌클릭 빈 공간: 즉시 노트 생성<br/>
        Shift + 빈 공간 드래그: 박스 선택<br/>
        좌클릭 노트: 선택<br/>
        선택된 노트 드래그: 이동<br/>
        노트 오른쪽 끝 드래그: 길이 조절<br/>
        우클릭 노트: 삭제<br/>
        Space: 재생/일시정지<br/>
        Delete: 선택 삭제<br/>
        Ctrl/Cmd+C, Ctrl/Cmd+V: 복사/붙여넣기<br/>
        방향키: 선택 노트 미세 이동
      </div>
    </aside>

    <section class="main">
      <div class="transport">
        <div class="row" style="margin-bottom:0;">
          <button id="playBtn" class="primary">Play / Pause</button>
          <button id="stopBtn">Stop</button>
          <button id="rewindBtn">처음으로</button>
          <button id="clearCurrentTrackBtn" class="danger">현재 레이어 비우기</button>
          <span class="chip">현재 레이어: <span id="currentTrackLabel">Layer 1</span></span>
          <span class="chip">선택 노트: <span id="selectionCount">0</span></span>
          <div class="time-readout" id="timeReadout">00:00.000</div>
        </div>
      </div>

      <div class="toolbar">
        <div class="row" style="margin-bottom:0;">
          <label>생성 악기</label>
          <select id="instrumentPalette"></select>
          <label><input id="previewOnClick" type="checkbox" checked /> 클릭 프리뷰</label>
          <label>현재 트랙만 보기</label>
          <input id="focusCurrentTrackOnly" type="checkbox" />
          <label>배경 그리드 강조</label>
          <input id="highlightBars" type="checkbox" checked />
        </div>
      </div>

      <div class="canvas-wrap" id="canvasWrap">
        <canvas id="pianoRoll" width="5200" height="1200"></canvas>
      </div>

      <div class="statusbar">
        <div id="statusText">준비 완료</div>
        <div id="mouseInfo">-</div>
      </div>
    </section>
  </div>

  <script>
    const AudioContextCls = window.AudioContext || window.webkitAudioContext;
    const liveCtx = new AudioContextCls();

    const GM_PROGRAM_TO_INST = {
      0:'soft_keys', 8:'music_box', 9:'xylophone', 10:'marimba', 11:'dream_xylo', 12:'mallet',
      52:'airy_choir', 88:'warm_pad', 89:'dream_pad', 92:'crystal_bell', 93:'dream_xylo',
      80:'chip_lead', 81:'pulse_lead', 38:'synth_bass', 39:'round_bass', 115:'hat', 116:'snare', 117:'kick'
    };
    const INST_TO_GM_PROGRAM = {
      soft_keys:0, chip_lead:80, pulse_lead:81, warm_pad:89, synth_bass:38,
      pluck:24, mallet:12, noise_fx:98, riser:102, impact:119, kick:117, snare:116, hat:115,
      xylophone:9, marimba:10, dream_xylo:93, dream_marimba:11, crystal_bell:92,
      music_box:8, airy_choir:52, dream_pad:89, round_bass:39
    };

    const INSTRUMENTS = [
      ['soft_keys','Soft Keys'], ['chip_lead','Chip Lead'], ['pulse_lead','Pulse Lead'], ['warm_pad','Warm Pad'],
      ['synth_bass','Synth Bass'], ['pluck','Pluck'], ['mallet','Mallet'], ['noise_fx','Noise FX'],
      ['riser','Riser'], ['impact','Impact'], ['kick','Kick'], ['snare','Snare'], ['hat','Hi-Hat'],
      ['xylophone','Xylophone'], ['marimba','Marimba'], ['dream_xylo','Dream Xylophone'],
      ['dream_marimba','Dream Marimba'], ['crystal_bell','Crystal Bell'], ['music_box','Music Box'],
      ['airy_choir','Airy Choir'], ['dream_pad','Dream Pad'], ['round_bass','Round Bass'],
	  ['glass_harmonica','Glass Harmonica'],['handpan','Handpan'],['aquarion','Aquarion'],
	  ['steel_tongue','Steel Tongue Drum'],['vibraphone','Vibraphone'],['kalimba','Kalimba']
    ];

    const COLORS = {
      soft_keys:'#56b6ff', chip_lead:'#ffaa44', pulse_lead:'#ff66aa', warm_pad:'#54e3c2', synth_bass:'#22cc88',
      pluck:'#ff7777', mallet:'#b48cff', noise_fx:'#c9c9c9', riser:'#8cf0ff', impact:'#ffae5a',
      kick:'#8f8f8f', snare:'#dadada', hat:'#f5f5f5', xylophone:'#ffd36e', marimba:'#c18bff',
      dream_xylo:'#9ad8ff', dream_marimba:'#c7a6ff', crystal_bell:'#9fe7ff', music_box:'#ffe38a',
      airy_choir:'#d7c6ff', dream_pad:'#7ee6d8', round_bass:'#5acb8a', glass_harmonica:'#b7ecff',
	  handpan:'#7fd1b9', 	aquarion:'#9ad8ff',	steel_tongue:'#8fbfff',	vibraphone:'#a0a0ff',
	  kalimba:'#ffd27d'
    };

    const HEADER_WIDTH = 90;
    const RULER_HEIGHT = 28;
    const ROW_HEIGHT = 18;
    const MIN_PITCH = 36;
    const MAX_PITCH = 96;
    const TOTAL_ROWS = MAX_PITCH - MIN_PITCH + 1;
    const PIXELS_PER_BEAT = 48;
    const DEFAULT_BARS = 16;
    const MIN_NOTE_BEATS = 0.125;
    const RESIZE_HANDLE_PX = 8;
    const DRAG_THRESHOLD_PX = 6;

    let project = {
      name: 'Game Audio Project',
      bpm: 120,
      timeSigNumerator: 4,
      snapBeats: 0.5,
      loopEnabled: false,
      loopStartBeat: 0,
      loopEndBeat: 16,
      masterFx: { filter:0, drive:0, delay:0, reverb:12, volume:70 },
      tracks: []
    };

    let noteIdCounter = 1;
    let trackIdCounter = 1;
    let currentTrackIndex = 0;
    let clipboard = [];

    let isPlaying = false;
    let playbackBeat = 0;
    let playbackStartCtxTime = 0;
    let scheduledCache = new Set();
    let schedulerTimer = null;

    let selectedNoteIds = new Set();
    let dragState = null;
    let selectionRect = null;
    let marqueeStart = null;
    let liveMasterGraph = null;

    const canvas = document.getElementById('pianoRoll');
    const ctx2d = canvas.getContext('2d');
    const instrumentPalette = document.getElementById('instrumentPalette');
    const tracksList = document.getElementById('tracksList');

    for (const [value, label] of INSTRUMENTS) {
      const opt = document.createElement('option');
      opt.value = value;
      opt.textContent = label;
      instrumentPalette.appendChild(opt);
    }

    function makeTrack(name = `Layer ${trackIdCounter}`) {
      return {
        id: trackIdCounter++,
        name,
        instrument: 'soft_keys',
        volume: 0.9,
        pan: 0,
        reverbSend: 0.15,
        mute: false,
        solo: false,
        notes: []
      };
    }
    project.tracks.push(makeTrack('Layer 1'));

    function beatsToSeconds(beats, bpm = project.bpm) { return beats * (60 / bpm); }
    function secondsToBeats(sec, bpm = project.bpm) { return sec / (60 / bpm); }
    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
    function snapBeatFloor(v) {
      if (!project.snapBeats) return Math.max(0, v);
      return Math.max(0, Math.floor(v / project.snapBeats) * project.snapBeats);
    }
    function snapBeatNearest(v) {
      if (!project.snapBeats) return Math.max(0, v);
      return Math.max(0, Math.round(v / project.snapBeats) * project.snapBeats);
    }
    function pitchToFreq(p) { return 440 * Math.pow(2, (p - 69) / 12); }
    function pitchToName(pitch) {
      const names = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
      return `${names[pitch % 12]}${Math.floor(pitch / 12) - 1}`;
    }
    function getSongEndBeat() {
      let maxBeat = DEFAULT_BARS * project.timeSigNumerator;
      for (const track of project.tracks) {
        for (const note of track.notes) {
          maxBeat = Math.max(maxBeat, note.start + note.duration + project.timeSigNumerator);
        }
      }
      return maxBeat;
    }
    function ensureCanvasSize() {
      const totalBeats = Math.ceil(getSongEndBeat() + project.timeSigNumerator * 4);
      canvas.width = Math.max(HEADER_WIDTH + totalBeats * PIXELS_PER_BEAT, Math.max(window.innerWidth * 2, 5000));
      canvas.height = RULER_HEIGHT + TOTAL_ROWS * ROW_HEIGHT;
    }
    function getCurrentTrack() { return project.tracks[currentTrackIndex]; }
    function anySolo() { return project.tracks.some(t => t.solo); }
    function trackAudible(track) {
      if (anySolo()) return track.solo && !track.mute;
      return !track.mute;
    }

    function updateProjectControls() {
      document.getElementById('projectName').value = project.name;
      document.getElementById('bpmInput').value = project.bpm;
      document.getElementById('timeSigNumerator').value = project.timeSigNumerator;
      document.getElementById('snapSelect').value = String(project.snapBeats);
      document.getElementById('loopEnabled').checked = project.loopEnabled;
      document.getElementById('loopStartInput').value = project.loopStartBeat;
      document.getElementById('loopEndInput').value = project.loopEndBeat;
      document.getElementById('masterFilter').value = project.masterFx.filter;
      document.getElementById('masterDrive').value = project.masterFx.drive;
      document.getElementById('masterDelay').value = project.masterFx.delay;
      document.getElementById('masterReverb').value = project.masterFx.reverb;
      document.getElementById('masterVolume').value = project.masterFx.volume;
      document.getElementById('currentTrackLabel').textContent = getCurrentTrack().name;
      instrumentPalette.value = getCurrentTrack().instrument;
    }

    function escapeHtml(str) {
      return str.replace(/[&<>\"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    }

    function refreshTracksUI() {
      tracksList.innerHTML = '';
      project.tracks.forEach((track, index) => {
        const card = document.createElement('div');
        card.className = 'track-card';
        card.style.outline = index === currentTrackIndex ? '2px solid #5a9bd8' : 'none';
        card.innerHTML = `
          <div class="track-header">
            <button data-action="select">${index + 1}</button>
            <input type="text" value="${escapeHtml(track.name)}" data-field="name" />
            <button data-action="delete" class="danger">X</button>
          </div>
          <div class="track-controls">
            <label>악기</label>
            <select data-field="instrument">${INSTRUMENTS.map(([v,l]) => `<option value="${v}" ${track.instrument===v?'selected':''}>${l}</option>`).join('')}</select>
            <label>Volume</label>
            <input type="range" min="0" max="1.2" step="0.01" value="${track.volume}" data-field="volume" />
            <label>Pan</label>
            <input type="range" min="-1" max="1" step="0.01" value="${track.pan}" data-field="pan" />
            <label>Reverb</label>
            <input type="range" min="0" max="1" step="0.01" value="${track.reverbSend}" data-field="reverbSend" />
            <div class="full small-btns">
              <button data-action="mute" class="${track.mute?'active':''}">M</button>
              <button data-action="solo" class="${track.solo?'active':''}">S</button>
              <button data-action="clear">노트 비우기</button>
            </div>
            <div class="full mini">노트 ${track.notes.length}개 · ${INSTRUMENTS.find(x=>x[0]===track.instrument)?.[1] || track.instrument}</div>
          </div>
        `;
        card.addEventListener('click', (e) => {
          if (e.target.closest('button[data-action="select"]')) {
            currentTrackIndex = index;
            refreshTracksUI();
            updateProjectControls();
            return;
          }
          if (e.target.closest('button[data-action="delete"]')) {
            if (project.tracks.length === 1) return setStatus('최소 1개 레이어는 필요합니다.');
            project.tracks.splice(index, 1);
            if (currentTrackIndex >= project.tracks.length) currentTrackIndex = project.tracks.length - 1;
            selectedNoteIds.clear();
            refreshTracksUI(); ensureCanvasSize(); updateProjectControls(); updateSelectionCount();
            return;
          }
          if (e.target.closest('button[data-action="mute"]')) {
            track.mute = !track.mute; refreshTracksUI(); return;
          }
          if (e.target.closest('button[data-action="solo"]')) {
            track.solo = !track.solo; refreshTracksUI(); return;
          }
          if (e.target.closest('button[data-action="clear"]')) {
            if (confirm(`${track.name} 레이어의 노트를 모두 삭제할까요?`)) {
              track.notes = []; selectedNoteIds.clear(); updateSelectionCount(); ensureCanvasSize(); refreshTracksUI();
            }
            return;
          }
        });
        card.querySelectorAll('[data-field]').forEach(el => {
          el.addEventListener('input', () => {
            const field = el.dataset.field;
            if (field === 'name') track.name = el.value || `Layer ${index+1}`;
            if (field === 'instrument') track.instrument = el.value;
            if (field === 'volume') track.volume = parseFloat(el.value);
            if (field === 'pan') track.pan = parseFloat(el.value);
            if (field === 'reverbSend') track.reverbSend = parseFloat(el.value);
            updateProjectControls();
          });
        });
        tracksList.appendChild(card);
      });
      document.getElementById('currentTrackLabel').textContent = getCurrentTrack().name;
    }

    function setStatus(msg) { document.getElementById('statusText').textContent = msg; }
    function updateSelectionCount() { document.getElementById('selectionCount').textContent = String(selectedNoteIds.size); }

    function getNoteRect(note) {
      return {
        x: HEADER_WIDTH + note.start * PIXELS_PER_BEAT,
        y: RULER_HEIGHT + (MAX_PITCH - note.pitch) * ROW_HEIGHT,
        w: Math.max(4, note.duration * PIXELS_PER_BEAT),
        h: ROW_HEIGHT - 2
      };
    }

    function allVisibleTracks() {
      if (document.getElementById('focusCurrentTrackOnly').checked) return [getCurrentTrack()];
      return project.tracks;
    }

    function draw() {
      ctx2d.clearRect(0, 0, canvas.width, canvas.height);
      const totalBeats = Math.ceil((canvas.width - HEADER_WIDTH) / PIXELS_PER_BEAT);
      const barBeats = project.timeSigNumerator;
      const highlightBars = document.getElementById('highlightBars').checked;

      ctx2d.fillStyle = '#151515';
      ctx2d.fillRect(HEADER_WIDTH, 0, canvas.width - HEADER_WIDTH, RULER_HEIGHT);

      for (let row = 0; row < TOTAL_ROWS; row++) {
        const pitch = MAX_PITCH - row;
        const y = RULER_HEIGHT + row * ROW_HEIGHT;
        const isBlack = [1,3,6,8,10].includes(pitch % 12);
        ctx2d.fillStyle = isBlack ? '#151515' : '#1d1d1d';
        ctx2d.fillRect(0, y, canvas.width, ROW_HEIGHT);
        ctx2d.strokeStyle = '#2e2e2e';
        ctx2d.beginPath(); ctx2d.moveTo(HEADER_WIDTH, y); ctx2d.lineTo(canvas.width, y); ctx2d.stroke();
      }

      ctx2d.font = '11px sans-serif';
      ctx2d.textAlign = 'left';
      ctx2d.textBaseline = 'top';
      for (let beat = 0; beat <= totalBeats; beat++) {
        const x = HEADER_WIDTH + beat * PIXELS_PER_BEAT;
        const isBar = beat % barBeats === 0;
        const isGrid = project.snapBeats ? Math.abs((beat / project.snapBeats) - Math.round(beat / project.snapBeats)) < 0.0001 : false;
        if (highlightBars && isBar) {
          ctx2d.fillStyle = beat/barBeats % 2 === 0 ? 'rgba(255,255,255,0.02)' : 'rgba(255,255,255,0.04)';
          ctx2d.fillRect(x, RULER_HEIGHT, barBeats * PIXELS_PER_BEAT, canvas.height - RULER_HEIGHT);
        }
        ctx2d.strokeStyle = isBar ? '#666' : isGrid ? '#3e3e3e' : '#272727';
        ctx2d.beginPath(); ctx2d.moveTo(x, 0); ctx2d.lineTo(x, canvas.height); ctx2d.stroke();
        if (isBar && beat < totalBeats) {
          ctx2d.fillStyle = '#ddd';
          ctx2d.fillText(`${Math.floor(beat / barBeats) + 1}`, x + 4, 10);
        }
      }

      ctx2d.fillStyle = '#111';
      ctx2d.fillRect(0, 0, HEADER_WIDTH, canvas.height);
      ctx2d.strokeStyle = '#666';
      ctx2d.beginPath(); ctx2d.moveTo(HEADER_WIDTH, 0); ctx2d.lineTo(HEADER_WIDTH, canvas.height); ctx2d.stroke();

      ctx2d.fillStyle = '#ddd';
      ctx2d.font = '11px monospace';
      ctx2d.textAlign = 'right';
      ctx2d.textBaseline = 'middle';
      for (let i = 0; i < TOTAL_ROWS; i++) {
        const pitch = MAX_PITCH - i;
        const y = RULER_HEIGHT + i * ROW_HEIGHT + ROW_HEIGHT / 2;
        ctx2d.fillText(pitchToName(pitch), HEADER_WIDTH - 6, y);
      }

      for (const track of allVisibleTracks()) {
        const alpha = track === getCurrentTrack() ? 1 : 0.55;
        for (const note of track.notes) {
          const r = getNoteRect(note);
          const isSelected = selectedNoteIds.has(note.id);
          ctx2d.globalAlpha = alpha;
          ctx2d.fillStyle = isSelected ? '#ffffff' : (COLORS[track.instrument] || '#66aaff');
          ctx2d.fillRect(r.x, r.y + 1, r.w, r.h);
          ctx2d.strokeStyle = isSelected ? '#000' : '#101010';
          ctx2d.strokeRect(r.x, r.y + 1, r.w, r.h);
          if (track === getCurrentTrack()) {
            ctx2d.fillStyle = 'rgba(0,0,0,0.22)';
            ctx2d.fillRect(r.x + r.w - RESIZE_HANDLE_PX, r.y + 1, RESIZE_HANDLE_PX, r.h);
          }
        }
      }
      ctx2d.globalAlpha = 1;

      if (selectionRect) {
        ctx2d.fillStyle = 'rgba(90,155,216,0.15)';
        ctx2d.fillRect(selectionRect.x, selectionRect.y, selectionRect.w, selectionRect.h);
        ctx2d.strokeStyle = '#5a9bd8';
        ctx2d.strokeRect(selectionRect.x, selectionRect.y, selectionRect.w, selectionRect.h);
      }

      if (project.loopEnabled) {
        const lx = HEADER_WIDTH + project.loopStartBeat * PIXELS_PER_BEAT;
        const rx = HEADER_WIDTH + project.loopEndBeat * PIXELS_PER_BEAT;
        ctx2d.fillStyle = 'rgba(119, 222, 119, 0.07)';
        ctx2d.fillRect(lx, 0, rx - lx, canvas.height);
        ctx2d.strokeStyle = '#77de77';
        ctx2d.beginPath(); ctx2d.moveTo(lx,0); ctx2d.lineTo(lx,canvas.height); ctx2d.stroke();
        ctx2d.beginPath(); ctx2d.moveTo(rx,0); ctx2d.lineTo(rx,canvas.height); ctx2d.stroke();
      }

      const playX = HEADER_WIDTH + playbackBeat * PIXELS_PER_BEAT;
      ctx2d.strokeStyle = '#ffeb3b';
      ctx2d.lineWidth = 2;
      ctx2d.beginPath(); ctx2d.moveTo(playX, 0); ctx2d.lineTo(playX, canvas.height); ctx2d.stroke();
      ctx2d.lineWidth = 1;

      document.getElementById('timeReadout').textContent = formatTime(beatsToSeconds(playbackBeat));
      requestAnimationFrame(draw);
    }

    function formatTime(sec) {
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60);
      const ms = Math.floor((sec - Math.floor(sec)) * 1000);
      return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(ms).padStart(3,'0')}`;
    }

    function pointToBeatPitch(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      const x = clientX - rect.left;
      const y = clientY - rect.top;
      const beat = (x - HEADER_WIDTH) / PIXELS_PER_BEAT;
      const pitch = clamp(MAX_PITCH - Math.floor((y - RULER_HEIGHT) / ROW_HEIGHT), MIN_PITCH, MAX_PITCH);
      return { x, y, beat, pitch };
    }

    function hitTestNote(x, y) {
      const track = getCurrentTrack();
      for (let i = track.notes.length - 1; i >= 0; i--) {
        const note = track.notes[i];
        const r = getNoteRect(note);
        if (x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h) {
          const onResize = x >= r.x + r.w - RESIZE_HANDLE_PX;
          return { note, track, onResize };
        }
      }
      return null;
    }

    function getSelectedNotes() {
      const result = [];
      for (const track of project.tracks) {
        for (const note of track.notes) {
          if (selectedNoteIds.has(note.id)) result.push({ track, note });
        }
      }
      return result;
    }

    function selectOnly(note) {
      selectedNoteIds.clear();
      selectedNoteIds.add(note.id);
      updateSelectionCount();
    }
    function toggleNoteSelection(note) {
      selectedNoteIds.has(note.id) ? selectedNoteIds.delete(note.id) : selectedNoteIds.add(note.id);
      updateSelectionCount();
    }

    function deleteSelectedNotes() {
      if (!selectedNoteIds.size) return;
      for (const track of project.tracks) {
        track.notes = track.notes.filter(n => !selectedNoteIds.has(n.id));
      }
      selectedNoteIds.clear();
      updateSelectionCount();
      ensureCanvasSize();
      refreshTracksUI();
      setStatus('선택 노트를 삭제했습니다.');
    }

    function duplicateSelection() {
      const selected = getSelectedNotes();
      if (!selected.length) return;
      const minStart = Math.min(...selected.map(x => x.note.start));
      const maxEnd = Math.max(...selected.map(x => x.note.start + x.note.duration));
      const offset = maxEnd - minStart;
      selectedNoteIds.clear();
      for (const { track, note } of selected) {
        const copy = { ...note, id: noteIdCounter++, start: note.start + offset };
        track.notes.push(copy);
        selectedNoteIds.add(copy.id);
      }
      updateSelectionCount();
      ensureCanvasSize();
      refreshTracksUI();
      setStatus('선택 노트를 복제했습니다.');
    }

    function copySelection() {
      const selected = getSelectedNotes();
      if (!selected.length) return;
      const minStart = Math.min(...selected.map(x => x.note.start));
      clipboard = selected.map(({ track, note }) => ({
        trackId: track.id,
        pitch: note.pitch,
        start: note.start - minStart,
        duration: note.duration
      }));
      setStatus(`선택 노트 ${clipboard.length}개를 복사했습니다.`);
    }

    function pasteSelection() {
      if (!clipboard.length) return;
      const track = getCurrentTrack();
      selectedNoteIds.clear();
      for (const item of clipboard) {
        const note = {
          id: noteIdCounter++,
          pitch: item.pitch,
          start: snapBeatFloor(playbackBeat + item.start),
          duration: item.duration
        };
        track.notes.push(note);
        selectedNoteIds.add(note.id);
      }
      updateSelectionCount();
      ensureCanvasSize();
      refreshTracksUI();
      setStatus('클립보드 노트를 붙여넣었습니다.');
    }

    function updateSelectionFromRect() {
      if (!selectionRect) return;
      selectedNoteIds.clear();
      for (const note of getCurrentTrack().notes) {
        const r = getNoteRect(note);
        const intersects = !(r.x > selectionRect.x + selectionRect.w || r.x + r.w < selectionRect.x || r.y > selectionRect.y + selectionRect.h || r.y + r.h < selectionRect.y);
        if (intersects) selectedNoteIds.add(note.id);
      }
      updateSelectionCount();
    }

    function moveSelectedNotesBy(deltaBeat, deltaPitch = 0) {
      const selected = getSelectedNotes();
      for (const { note } of selected) {
        note.start = Math.max(0, note.start + deltaBeat);
        note.pitch = clamp(note.pitch + deltaPitch, MIN_PITCH, MAX_PITCH);
      }
      ensureCanvasSize();
    }

    function fastPreview(track, note) {
      if (!document.getElementById('previewOnClick').checked) return;
      requestAnimationFrame(() => previewNote(track, note));
    }

    canvas.addEventListener('mousedown', async (e) => {
      if (liveCtx.state === 'suspended') {
        try { await liveCtx.resume(); } catch (err) {}
      }
      const { x, y, beat, pitch } = pointToBeatPitch(e.clientX, e.clientY);
      if (x < HEADER_WIDTH) return;

      if (y <= RULER_HEIGHT) {
        playbackBeat = snapBeatNearest(Math.max(0, beat));
        if (isPlaying) playbackStartCtxTime = liveCtx.currentTime - beatsToSeconds(playbackBeat);
        dragState = { mode: 'playhead', startX: x, startY: y };
        return;
      }

      const hit = hitTestNote(x, y);

      if (e.button === 2) {
        if (hit) {
          const track = hit.track;
          track.notes = track.notes.filter(n => n.id !== hit.note.id);
          selectedNoteIds.delete(hit.note.id);
          updateSelectionCount();
          ensureCanvasSize();
          refreshTracksUI();
        }
        return;
      }

      if (hit) {
        if (e.shiftKey) toggleNoteSelection(hit.note);
        else if (!selectedNoteIds.has(hit.note.id)) selectOnly(hit.note);
        const selected = getSelectedNotes();
        dragState = {
          mode: hit.onResize ? 'resize_pending' : 'move_pending',
          startX: x,
          startY: y,
          originBeat: beat,
          originPitch: pitch,
          original: selected.map(({ track, note }) => ({ track, note, start: note.start, duration: note.duration, pitch: note.pitch }))
        };
        return;
      }

      if (e.shiftKey) {
        marqueeStart = { x, y };
        selectionRect = null;
        dragState = { mode: 'marquee_pending', startX: x, startY: y };
        if (!e.ctrlKey && !e.metaKey) {
          selectedNoteIds.clear();
          updateSelectionCount();
        }
        return;
      }

      const track = getCurrentTrack();
      const startBeat = snapBeatFloor(Math.max(0, beat));
      const notePitch = pitch;
      const dup = track.notes.some(n => n.pitch === notePitch && Math.abs(n.start - startBeat) < 0.001);
      if (!dup) {
        const note = {
          id: noteIdCounter++,
          start: startBeat,
          duration: Math.max(project.snapBeats || 0.5, MIN_NOTE_BEATS),
          pitch: notePitch
        };
        track.notes.push(note);
        selectOnly(note);
        ensureCanvasSize();
        fastPreview(track, note);
      }
    });

    canvas.addEventListener('mousemove', (e) => {
      const { x, y, beat, pitch } = pointToBeatPitch(e.clientX, e.clientY);
      document.getElementById('mouseInfo').textContent = `Beat ${beat.toFixed(2)} · ${pitchToName(pitch)}`;
      if (!dragState) return;

      const moveDist = Math.hypot(x - dragState.startX, y - dragState.startY);
      if (dragState.mode === 'marquee_pending') {
        if (moveDist < DRAG_THRESHOLD_PX) return;
        dragState.mode = 'marquee';
      }
      if (dragState.mode === 'move_pending') {
        if (moveDist < DRAG_THRESHOLD_PX) return;
        dragState.mode = 'move';
      }
      if (dragState.mode === 'resize_pending') {
        if (moveDist < DRAG_THRESHOLD_PX) return;
        dragState.mode = 'resize';
      }

      if (dragState.mode === 'marquee' && marqueeStart) {
        selectionRect = {
          x: Math.min(marqueeStart.x, x),
          y: Math.min(marqueeStart.y, y),
          w: Math.abs(x - marqueeStart.x),
          h: Math.abs(y - marqueeStart.y)
        };
        updateSelectionFromRect();
        return;
      }
      if (dragState.mode === 'playhead') {
        playbackBeat = snapBeatNearest(Math.max(0, beat));
        if (isPlaying) playbackStartCtxTime = liveCtx.currentTime - beatsToSeconds(playbackBeat);
        return;
      }
      if (dragState.mode === 'move') {
        const deltaBeat = snapBeatNearest(beat) - snapBeatNearest(dragState.originBeat);
        const deltaPitch = pitch - dragState.originPitch;
        for (const item of dragState.original) {
          item.note.start = Math.max(0, item.start + deltaBeat);
          item.note.pitch = clamp(item.pitch + deltaPitch, MIN_PITCH, MAX_PITCH);
        }
        return;
      }
      if (dragState.mode === 'resize') {
        const deltaBeat = snapBeatNearest(beat) - snapBeatNearest(dragState.originBeat);
        for (const item of dragState.original) {
          item.note.duration = Math.max(MIN_NOTE_BEATS, item.duration + deltaBeat);
        }
      }
    });

    window.addEventListener('mouseup', () => {
      if (dragState && (dragState.mode === 'move' || dragState.mode === 'resize' || dragState.mode === 'marquee')) {
        ensureCanvasSize();
      }
      dragState = null;
      marqueeStart = null;
      selectionRect = null;
    });

    canvas.addEventListener('contextmenu', e => e.preventDefault());

    function rebuildLiveMasterGraph() {
      if (liveMasterGraph) disconnectGraph(liveMasterGraph);
      liveMasterGraph = createMasterGraph(liveCtx, project.masterFx, liveCtx.destination);
    }

    async function previewNote(track, note) {
      if (liveCtx.state === 'suspended') await liveCtx.resume();
      if (!liveMasterGraph) rebuildLiveMasterGraph();
      scheduleInstrumentNote(liveCtx, liveMasterGraph.input, note.pitch, liveCtx.currentTime, beatsToSeconds(note.duration), track.instrument, {
        volume: track.volume,
        pan: track.pan,
        reverbSend: track.reverbSend,
        ctxDestination: liveMasterGraph
      });
    }

    function disconnectGraph(graph) {
      try { graph.input.disconnect(); } catch(e) {}
      try { graph.output.disconnect(); } catch(e) {}
      try { graph.delay.disconnect(); } catch(e) {}
      try { graph.feedback.disconnect(); } catch(e) {}
      try { graph.dry.disconnect(); } catch(e) {}
      try { graph.wet.disconnect(); } catch(e) {}
      try { graph.reverb.disconnect(); } catch(e) {}
    }

    function schedulerTick() {
      if (!isPlaying) return;
      const nowBeat = secondsToBeats(liveCtx.currentTime - playbackStartCtxTime);
      playbackBeat = nowBeat;
      const horizonBeat = nowBeat + secondsToBeats(0.15);

      if (project.loopEnabled && nowBeat >= project.loopEndBeat) {
        playbackBeat = project.loopStartBeat;
        playbackStartCtxTime = liveCtx.currentTime - beatsToSeconds(playbackBeat);
        scheduledCache.clear();
        return;
      }

      if (!liveMasterGraph) rebuildLiveMasterGraph();
      const startBeatForLoop = project.loopEnabled ? project.loopStartBeat : 0;
      const endBeatForLoop = project.loopEnabled ? project.loopEndBeat : Infinity;

      for (const track of project.tracks) {
        if (!trackAudible(track)) continue;
        for (const note of track.notes) {
          if (note.start < startBeatForLoop || note.start >= endBeatForLoop) continue;
          const key = `${track.id}:${note.id}:${Math.floor(note.start*1000)}`;
          if (note.start >= nowBeat - 0.01 && note.start < horizonBeat && !scheduledCache.has(key)) {
            const when = playbackStartCtxTime + beatsToSeconds(note.start);
            scheduleInstrumentNote(liveCtx, liveMasterGraph.input, note.pitch, when, beatsToSeconds(note.duration), track.instrument, {
              volume: track.volume,
              pan: track.pan,
              reverbSend: track.reverbSend,
              ctxDestination: liveMasterGraph
            });
            scheduledCache.add(key);
          }
        }
      }
    }

    async function togglePlay() {
      if (liveCtx.state === 'suspended') await liveCtx.resume();
      if (isPlaying) {
        isPlaying = false;
        clearInterval(schedulerTimer);
        setStatus('일시정지');
      } else {
        isPlaying = true;
        playbackStartCtxTime = liveCtx.currentTime - beatsToSeconds(playbackBeat);
        scheduledCache.clear();
        schedulerTimer = setInterval(schedulerTick, 25);
        setStatus('재생 중');
      }
    }

    function stopPlayback() {
      isPlaying = false;
      clearInterval(schedulerTimer);
      playbackBeat = 0;
      scheduledCache.clear();
      setStatus('정지');
    }

    function rewindToLoopOrStart() {
      playbackBeat = project.loopEnabled ? project.loopStartBeat : 0;
      if (isPlaying) playbackStartCtxTime = liveCtx.currentTime - beatsToSeconds(playbackBeat);
      scheduledCache.clear();
      setStatus('재생 위치를 이동했습니다.');
    }

    const sharedNoiseBuffers = new WeakMap();
    function createNoiseBuffer(ctx, seconds = 3) {
      if (sharedNoiseBuffers.has(ctx)) return sharedNoiseBuffers.get(ctx);
      const buf = ctx.createBuffer(1, ctx.sampleRate * seconds, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
      sharedNoiseBuffers.set(ctx, buf);
      return buf;
    }

    function makeImpulseResponse(ctx, duration = 2.6, decay = 2.2) {
      const length = ctx.sampleRate * duration;
      const impulse = ctx.createBuffer(2, length, ctx.sampleRate);
      for (let ch = 0; ch < 2; ch++) {
        const d = impulse.getChannelData(ch);
        for (let i = 0; i < length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, decay);
      }
      return impulse;
    }

    function makeDistortionCurve(amount) {
      if (!amount) return null;
      const n = 44100;
      const curve = new Float32Array(n);
      const deg = Math.PI / 180;
      for (let i = 0; i < n; i++) {
        const x = i * 2 / n - 1;
        curve[i] = (3 + amount) * x * 20 * deg / (Math.PI + amount * Math.abs(x));
      }
      return curve;
    }

    function createMasterGraph(ctx, masterFx, destination) {
      const input = ctx.createGain();
      const filter = ctx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 22000 - (masterFx.filter / 100) * 21600;
      const drive = ctx.createWaveShaper();
      drive.curve = makeDistortionCurve(masterFx.drive * 4);
      drive.oversample = '4x';
      const delay = ctx.createDelay(3.0);
      delay.delayTime.value = (masterFx.delay / 100) * 0.45;
      const feedback = ctx.createGain();
      feedback.gain.value = (masterFx.delay / 100) * 0.45;
      const reverb = ctx.createConvolver();
      reverb.buffer = makeImpulseResponse(ctx, 2.2, 2.0);
      const dry = ctx.createGain();
      const wet = ctx.createGain();
      dry.gain.value = 1 - (masterFx.reverb / 100) * 0.6;
      wet.gain.value = (masterFx.reverb / 100) * 0.6;
      const output = ctx.createGain();
      output.gain.value = masterFx.volume / 100;

      input.connect(filter);
      filter.connect(drive);
      drive.connect(delay);
      drive.connect(dry);
      delay.connect(feedback);
      feedback.connect(delay);
      delay.connect(dry);
      drive.connect(reverb);
      delay.connect(reverb);
      reverb.connect(wet);
      dry.connect(output);
      wet.connect(output);
      output.connect(destination);
      return { input, filter, drive, delay, feedback, reverb, dry, wet, output };
    }

    function scheduleInstrumentNote(ctx, destination, pitch, time, durationSec, inst, trackMix) {
      const freq = pitchToFreq(pitch);
      const noiseBuffer = createNoiseBuffer(ctx, 3);
      const trackIn = ctx.createGain();
      trackIn.gain.value = Math.max(0, trackMix.volume ?? 1);
      const panNode = ctx.createStereoPanner ? ctx.createStereoPanner() : null;
      const drySend = ctx.createGain();
      const wetSend = ctx.createGain();
      drySend.gain.value = 1 - (trackMix.reverbSend ?? 0) * 0.5;
      wetSend.gain.value = trackMix.reverbSend ?? 0;
      if (panNode) panNode.pan.value = trackMix.pan ?? 0;
      trackIn.connect(panNode || drySend);
      if (panNode) { panNode.connect(drySend); panNode.connect(wetSend); } else { trackIn.connect(wetSend); }
      drySend.connect(destination);
      wetSend.connect(trackMix.ctxDestination.reverb);

      const out = trackIn;
      const noteDur = Math.max(0.04, durationSec);
      const shortFx = Math.min(0.7, Math.max(0.07, durationSec));

      const makeNoise = (type, freqVal, q=0.7) => {
        const src = ctx.createBufferSource();
        src.buffer = noiseBuffer;
        const f = ctx.createBiquadFilter();
        f.type = type;
        f.frequency.value = freqVal;
        f.Q.value = q;
        src.connect(f);
        return { src, out: f };
      };

      switch (inst) {
        case 'soft_keys': {
          const o1 = ctx.createOscillator(), o2 = ctx.createOscillator(), tone = ctx.createBiquadFilter(), g2 = ctx.createGain();
          o1.type='triangle'; o2.type='sine'; o1.frequency.value=freq; o2.frequency.value=freq*2; g2.gain.value=0.22; tone.type='lowpass'; tone.frequency.value=3200;
          o1.connect(tone); o2.connect(g2); g2.connect(tone); tone.connect(out);
          env(out.gain,time,0.01,0.12,0.36,Math.min(1.1,noteDur),0.55); startStop([o1,o2],time,time+noteDur+0.9); break;
        }
        case 'chip_lead': {
          const o = ctx.createOscillator(); o.type='square'; o.frequency.value=freq; o.connect(out);
          out.gain.setValueAtTime(0.0001,time); out.gain.linearRampToValueAtTime(0.32,time+0.004); out.gain.setValueAtTime(0.25,time+Math.max(0.03,noteDur-0.03)); out.gain.linearRampToValueAtTime(0.0001,time+noteDur);
          startStop([o],time,time+noteDur+0.04); break;
        }
        case 'pulse_lead': {
          const o1=ctx.createOscillator(),o2=ctx.createOscillator(),tone=ctx.createBiquadFilter(),g2=ctx.createGain();
          o1.type='square'; o2.type='sawtooth'; o1.frequency.value=freq; o2.frequency.value=freq; o2.detune.value=7; g2.gain.value=0.28; tone.type='lowpass'; tone.frequency.value=4500;
          o1.connect(tone); o2.connect(g2); g2.connect(tone); tone.connect(out);
          out.gain.setValueAtTime(0.0001,time); out.gain.linearRampToValueAtTime(0.36,time+0.008); out.gain.linearRampToValueAtTime(0.2,time+0.08); out.gain.setValueAtTime(0.18,time+Math.max(0.08,noteDur-0.08)); out.gain.linearRampToValueAtTime(0.0001,time+noteDur);
          startStop([o1,o2],time,time+noteDur+0.05); break;
        }
        case 'warm_pad': {
          const o1=ctx.createOscillator(),o2=ctx.createOscillator(),o3=ctx.createOscillator(),tone=ctx.createBiquadFilter();
          const g1=ctx.createGain(),g2=ctx.createGain(),g3=ctx.createGain();

    function env(param, time, a, d, s, hold, r, peak = 1) {
      const sustainTime = Math.max(time + a + d, time + hold);
      param.cancelScheduledValues(time);
      param.setValueAtTime(0.0001, time);
      param.linearRampToValueAtTime(peak, time + a);
      param.linearRampToValueAtTime(peak * s, time + a + d);
      param.setValueAtTime(peak * s, sustainTime);
      param.exponentialRampToValueAtTime(0.0001, sustainTime + Math.max(0.02, r));
    }
    function startStop(nodes, start, stop) { nodes.forEach(n => { n.start(start); n.stop(stop); }); }

    function serializeProject() {
      return JSON.stringify({ ...project, noteIdCounter, trackIdCounter }, null, 2);
    }

    function loadProjectData(obj) {
      project = obj;
      noteIdCounter = obj.noteIdCounter || Math.max(1, ...project.tracks.flatMap(t => t.notes.map(n => n.id || 0))) + 1;
      trackIdCounter = obj.trackIdCounter || Math.max(1, ...project.tracks.map(t => t.id || 0)) + 1;
      project.tracks.forEach(t => {
        t.volume ??= 0.9; t.pan ??= 0; t.reverbSend ??= 0.15; t.mute ??= false; t.solo ??= false;
        t.notes.forEach(n => n.id ??= noteIdCounter++);
      });
      currentTrackIndex = clamp(currentTrackIndex, 0, project.tracks.length - 1);
      selectedNoteIds.clear();
      updateProjectControls();
      refreshTracksUI();
      ensureCanvasSize();
      setStatus('프로젝트를 불러왔습니다.');
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

      const buffer = new ArrayBuffer(44 + numSamples * blockAlign);
      const view = new DataView(buffer);
      let offset = 0;
      const writeString = s => { for (let i = 0; i < s.length; i++) view.setUint8(offset++, s.charCodeAt(i)); };
      writeString('RIFF'); view.setUint32(offset, 36 + numSamples * blockAlign, true); offset += 4; writeString('WAVE'); writeString('fmt ');
      view.setUint32(offset, 16, true); offset += 4; view.setUint16(offset, 1, true); offset += 2; view.setUint16(offset, numChannels, true); offset += 2;
      view.setUint32(offset, sampleRate, true); offset += 4; view.setUint32(offset, sampleRate * blockAlign, true); offset += 4; view.setUint16(offset, blockAlign, true); offset += 2; view.setUint16(offset, 16, true); offset += 2;
      writeString('data'); view.setUint32(offset, numSamples * blockAlign, true); offset += 4;
      const channels = Array.from({length:numChannels}, (_,i)=>audioBuffer.getChannelData(i));
      for (let i = 0; i < numSamples; i++) {
        for (let ch = 0; ch < numChannels; ch++) {
          const sample = Math.max(-1, Math.min(1, channels[ch][i]));
          view.setInt16(offset, sample < 0 ? sample * 0x8000 : sample * 0x7fff, true);
          offset += 2;
        }
      }
      return new Blob([buffer], { type: 'audio/wav' });
    }

    async function renderOffline(trackFilter = null) {
      const endBeat = getSongEndBeat() + project.timeSigNumerator;
      const durationSec = beatsToSeconds(endBeat) + 2;
      const offCtx = new OfflineAudioContext(2, Math.ceil(durationSec * 44100), 44100);
      const graph = createMasterGraph(offCtx, project.masterFx, offCtx.destination);
      for (const track of project.tracks) {
        if (trackFilter && track.id !== trackFilter.id) continue;
        if (!trackFilter && !trackAudible(track)) continue;
        for (const note of track.notes) {
          scheduleInstrumentNote(offCtx, graph.input, note.pitch, beatsToSeconds(note.start), beatsToSeconds(note.duration), track.instrument, {
            volume: track.volume, pan: track.pan, reverbSend: track.reverbSend, ctxDestination: graph
          });
        }
      }
      return await offCtx.startRendering();
    }

    async function exportMixWav() {
      setStatus('WAV 렌더링 중...');
      const buffer = await renderOffline();
      downloadBlob(encodeWav(buffer), `${safeName(project.name)}_mix.wav`);
      setStatus('WAV Export 완료');
    }

    async function exportStemZipless() {
      setStatus('Stem 렌더링 중...');
      for (const track of project.tracks) {
        if (!track.notes.length) continue;
        const buffer = await renderOffline(track);
        downloadBlob(encodeWav(buffer), `${safeName(project.name)}_${safeName(track.name)}.wav`);
      }
      setStatus('Stem Export 완료');
    }

    function safeName(str) { return (str || 'project').replace(/[^a-z0-9가-힣_\-]+/gi, '_'); }

    function exportMidi() {
      const ticksPerBeat = 128;
      function toVLQ(val) { let buf=[val&0x7F]; while ((val >>= 7)) buf.unshift((val&0x7F)|0x80); return buf; }
      const tempoTrackBytes = [];
      const mpqn = Math.round(60000000 / project.bpm);
      tempoTrackBytes.push(0x00, 0xFF, 0x51, 0x03, (mpqn >> 16) & 255, (mpqn >> 8) & 255, mpqn & 255);
      tempoTrackBytes.push(0x00, 0xFF, 0x58, 0x04, project.timeSigNumerator, 2, 24, 8);
      tempoTrackBytes.push(0x00, 0xFF, 0x2F, 0x00);
      const tempoLen = tempoTrackBytes.length;
      const trackChunks = [[0x4D,0x54,0x72,0x6B,(tempoLen>>24)&255,(tempoLen>>16)&255,(tempoLen>>8)&255,tempoLen&255,...tempoTrackBytes]];

      for (const track of project.tracks) {
        if (!track.notes.length) continue;
        const events = [];
        const gmProgram = INST_TO_GM_PROGRAM[track.instrument] ?? 0;
        events.push({tick:0, bytes:[0xC0, gmProgram]});
        for (const n of track.notes) {
          events.push({tick: Math.round(n.start * ticksPerBeat), bytes:[0x90, n.pitch, 100]});
          events.push({tick: Math.round((n.start + n.duration) * ticksPerBeat), bytes:[0x80, n.pitch, 0]});
        }
        events.sort((a,b)=>a.tick-b.tick || a.bytes[0]-b.bytes[0]);
        const bytes = [];
        let prev = 0;
        for (const ev of events) {
          bytes.push(...toVLQ(ev.tick - prev), ...ev.bytes);
          prev = ev.tick;
        }
        bytes.push(0x00,0xFF,0x2F,0x00);
        const len = bytes.length;
        trackChunks.push([0x4D,0x54,0x72,0x6B,(len>>24)&255,(len>>16)&255,(len>>8)&255,len&255,...bytes]);
      }
      if (trackChunks.length <= 1) return setStatus('내보낼 노트가 없습니다.');
      const numTracks = trackChunks.length;
      const header = [0x4D,0x54,0x68,0x64,0,0,0,6,0,1,(numTracks>>8)&255,numTracks&255,0,128];
      const allBytes = new Uint8Array([...header, ...trackChunks.flat()]);
      downloadBlob(new Blob([allBytes], {type:'audio/midi'}), `${safeName(project.name)}.mid`);
      setStatus('MIDI Export 완료');
    }

    function importMidiFile(file) {
      const reader = new FileReader();
      reader.onload = (evt) => {
        try {
          const buffer = evt.target.result;
          const view = new DataView(buffer);
          let offset = 0;
          if (view.getUint32(offset) !== 0x4D546864) throw new Error('유효한 MIDI 파일이 아닙니다.');
          offset += 8;
          offset += 2;
          const numTracks = view.getUint16(offset); offset += 2;
          const ticksPerBeat = view.getUint16(offset); offset += 2;
          const importedTracks = [];
          let detectedBpm = null;
          for (let i = 0; i < numTracks; i++) {
            if (view.getUint32(offset) !== 0x4D54726B) break;
            offset += 4;
            const trackLen = view.getUint32(offset); offset += 4;
            const trackEnd = offset + trackLen;
            let absTick = 0;
            let runningStatus = null;
            let currentProgram = 0;
            const active = {};
            const notes = [];
            while (offset < trackEnd) {
              let delta = 0;
              while (true) {
                const b = view.getUint8(offset++);
                delta = (delta << 7) | (b & 0x7F);
                if ((b & 0x80) === 0) break;
              }
              absTick += delta;
              let status = view.getUint8(offset);
              if (status < 0x80 && runningStatus !== null) status = runningStatus;
              else { offset++; runningStatus = status; }

              if (status === 0xFF) {
                const metaType = view.getUint8(offset++);
                let len = 0;
                while (true) {
                  const b = view.getUint8(offset++);
                  len = (len << 7) | (b & 0x7F);
                  if ((b & 0x80) === 0) break;
                }
                if (metaType === 0x51 && len === 3) {
                  const mpqn = (view.getUint8(offset) << 16) | (view.getUint8(offset + 1) << 8) | view.getUint8(offset + 2);
                  detectedBpm = Math.round(60000000 / mpqn);
                }
                offset += len;
                continue;
              }
              if (status === 0xF0 || status === 0xF7) {
                let len = 0;
                while (true) {
                  const b = view.getUint8(offset++);
                  len = (len << 7) | (b & 0x7F);
                  if ((b & 0x80) === 0) break;
                }
                offset += len;
                continue;
              }

              const eventType = status >> 4;
              const channel = status & 0x0F;
              if (eventType === 0xC) { currentProgram = view.getUint8(offset++); continue; }
              if (eventType === 0xD) { offset += 1; continue; }
              const data1 = view.getUint8(offset++);
              const data2 = view.getUint8(offset++);
              const beat = absTick / ticksPerBeat;
              if (eventType === 0x9 && data2 > 0) active[`${channel}:${data1}`] = beat;
              else if (eventType === 0x8 || (eventType === 0x9 && data2 === 0)) {
                const key = `${channel}:${data1}`;
                if (active[key] != null) {
                  notes.push({ id: noteIdCounter++, pitch: clamp(data1, MIN_PITCH, MAX_PITCH), start: active[key], duration: Math.max(MIN_NOTE_BEATS, beat - active[key]) });
                  delete active[key];
                }
              }
            }
            if (notes.length) {
              const t = makeTrack(`Layer ${importedTracks.length + 1}`);
              t.instrument = GM_PROGRAM_TO_INST[currentProgram] || 'soft_keys';
              t.notes = notes;
              importedTracks.push(t);
            }
          }
          project.tracks = importedTracks.length ? importedTracks : [makeTrack('Layer 1')];
          if (detectedBpm) project.bpm = detectedBpm;
          currentTrackIndex = 0;
          refreshTracksUI();
          ensureCanvasSize();
          updateProjectControls();
          setStatus('MIDI 불러오기 완료');
        } catch (err) {
          alert(err.message || String(err));
        }
      };
      reader.readAsArrayBuffer(file);
    }

    document.getElementById('playBtn').addEventListener('click', togglePlay);
    document.getElementById('stopBtn').addEventListener('click', stopPlayback);
    document.getElementById('rewindBtn').addEventListener('click', rewindToLoopOrStart);
    document.getElementById('addTrackBtn').addEventListener('click', () => {
      project.tracks.push(makeTrack());
      currentTrackIndex = project.tracks.length - 1;
      refreshTracksUI();
      ensureCanvasSize();
      updateProjectControls();
    });
    document.getElementById('clearCurrentTrackBtn').addEventListener('click', () => {
      const track = getCurrentTrack();
      if (!track.notes.length) return setStatus('현재 레이어에 삭제할 노트가 없습니다.');
      if (confirm(`${track.name} 레이어의 노트를 모두 삭제할까요?`)) {
        track.notes = [];
        selectedNoteIds.clear();
        updateSelectionCount();
        ensureCanvasSize();
        refreshTracksUI();
        setStatus('현재 레이어의 노트를 삭제했습니다.');
      }
    });
    document.getElementById('saveProjectBtn').addEventListener('click', () => {
      project.name = document.getElementById('projectName').value || 'Game Audio Project';
      downloadBlob(new Blob([serializeProject()], {type:'application/json'}), `${safeName(project.name)}.json`);
      setStatus('프로젝트를 저장했습니다.');
    });
    document.getElementById('loadProjectInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      file.text().then(txt => loadProjectData(JSON.parse(txt)));
      e.target.value = '';
    });
    document.getElementById('exportWavBtn').addEventListener('click', exportMixWav);
    document.getElementById('exportStemsBtn').addEventListener('click', exportStemZipless);
    document.getElementById('exportMidiBtn').addEventListener('click', exportMidi);
    document.getElementById('importMidiInput').addEventListener('change', e => {
      const f = e.target.files[0];
      if (f) importMidiFile(f);
      e.target.value = '';
    });
    document.getElementById('copySelectionBtn').addEventListener('click', copySelection);
    document.getElementById('pasteSelectionBtn').addEventListener('click', pasteSelection);
    document.getElementById('deleteSelectionBtn').addEventListener('click', deleteSelectedNotes);
    document.getElementById('duplicateSelectionBtn').addEventListener('click', duplicateSelection);
    document.getElementById('selectAllTrackBtn').addEventListener('click', () => {
      selectedNoteIds.clear();
      getCurrentTrack().notes.forEach(n => selectedNoteIds.add(n.id));
      updateSelectionCount();
    });
    document.getElementById('setLoopToSelectionBtn').addEventListener('click', () => {
      const selected = getSelectedNotes();
      if (!selected.length) return setStatus('선택 노트가 없습니다.');
      project.loopStartBeat = Math.min(...selected.map(x => x.note.start));
      project.loopEndBeat = Math.max(...selected.map(x => x.note.start + x.note.duration));
      project.loopEnabled = true;
      updateProjectControls();
      setStatus('선택 노트 범위를 루프로 설정했습니다.');
    });

    ['projectName','bpmInput','timeSigNumerator','snapSelect','loopEnabled','loopStartInput','loopEndInput','masterFilter','masterDrive','masterDelay','masterReverb','masterVolume'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => {
        project.name = document.getElementById('projectName').value;
        project.bpm = parseFloat(document.getElementById('bpmInput').value) || 120;
        project.timeSigNumerator = parseInt(document.getElementById('timeSigNumerator').value, 10) || 4;
        project.snapBeats = parseFloat(document.getElementById('snapSelect').value);
        project.loopEnabled = document.getElementById('loopEnabled').checked;
        project.loopStartBeat = Math.max(0, parseFloat(document.getElementById('loopStartInput').value) || 0);
        project.loopEndBeat = Math.max(project.loopStartBeat + 0.25, parseFloat(document.getElementById('loopEndInput').value) || project.timeSigNumerator * 4);
        project.masterFx.filter = parseFloat(document.getElementById('masterFilter').value);
        project.masterFx.drive = parseFloat(document.getElementById('masterDrive').value);
        project.masterFx.delay = parseFloat(document.getElementById('masterDelay').value);
        project.masterFx.reverb = parseFloat(document.getElementById('masterReverb').value);
        project.masterFx.volume = parseFloat(document.getElementById('masterVolume').value);
        rebuildLiveMasterGraph();
        ensureCanvasSize();
      });
    });

    instrumentPalette.addEventListener('change', () => {
      getCurrentTrack().instrument = instrumentPalette.value;
      refreshTracksUI();
    });

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') { e.preventDefault(); togglePlay(); return; }
      if (e.key === 'Delete') { deleteSelectedNotes(); return; }
      const cmd = e.ctrlKey || e.metaKey;
      if (cmd && e.key.toLowerCase() === 'c') { e.preventDefault(); copySelection(); }
      if (cmd && e.key.toLowerCase() === 'v') { e.preventDefault(); pasteSelection(); }
      if (cmd && e.key.toLowerCase() === 'd') { e.preventDefault(); duplicateSelection(); }
      if (!cmd && selectedNoteIds.size) {
        if (e.key === 'ArrowLeft') { e.preventDefault(); moveSelectedNotesBy(-(project.snapBeats || 0.5), 0); }
        if (e.key === 'ArrowRight') { e.preventDefault(); moveSelectedNotesBy((project.snapBeats || 0.5), 0); }
        if (e.key === 'ArrowUp') { e.preventDefault(); moveSelectedNotesBy(0, 1); }
        if (e.key === 'ArrowDown') { e.preventDefault(); moveSelectedNotesBy(0, -1); }
      }
    });

    updateProjectControls();
    refreshTracksUI();
    ensureCanvasSize();
    updateSelectionCount();
    rebuildLiveMasterGraph();
    draw();
  </script>
</body>
</html>
